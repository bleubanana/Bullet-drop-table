<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bullet Drop Referensguide</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #080b10; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // ─── Fysik & konstanter ─────────────────────────────────────────────────
    const SOUND = 340, G_ACC = 9.81, RHO = 1.225;
    const DISP  = [25, 50, 100, 150, 200, 300];
    const ZEROS = [25, 50, 100, 150, 200];

    const G1 = [
      [0,.2629],[.05,.2558],[.1,.2487],[.15,.2413],[.2,.2335],[.25,.2259],
      [.3,.2177],[.35,.2093],[.4,.2006],[.45,.1913],[.5,.182],[.55,.173],
      [.6,.1684],[.65,.1679],[.7,.17],[.75,.1806],[.8,.1945],[.85,.2155],
      [.9,.2395],[.95,.2728],[1,.3049],[1.05,.3733],[1.1,.4064],[1.15,.4132],
      [1.2,.3945],[1.25,.3782],[1.3,.3617],[1.4,.3349],[1.5,.3149],[1.6,.2999],
      [1.8,.2742],[2,.2547],[2.2,.2407],[2.4,.2297],[2.6,.22],[2.8,.2118],[3,.2048],
    ];

    function getCD(mach) {
      if (mach <= G1[0][0]) return G1[0][1];
      for (let i = 1; i < G1.length; i++) {
        if (mach <= G1[i][0]) {
          const f = (mach - G1[i-1][0]) / (G1[i][0] - G1[i-1][0]);
          return G1[i-1][1] + f * (G1[i][1] - G1[i-1][1]);
        }
      }
      return G1[G1.length-1][1];
    }

    function boreDropAll(bc_g1, mv, dists) {
      const bc = bc_g1 * 703.07;
      const sorted = [...dists].sort((a,b) => a-b);
      const drops = {};
      let x=0, y=0, vx=mv, vy=0, di=0;
      const dt = 0.0005;
      while (di < sorted.length) {
        while (di < sorted.length && x >= sorted[di]) { drops[sorted[di]] = y*100; di++; }
        if (di >= sorted.length) break;
        const v = Math.sqrt(vx*vx + vy*vy);
        if (v < 5) break;
        const ad = RHO * v * v * getCD(v/SOUND) / (2*bc);
        const inv = 1/v;
        vx += -ad*vx*inv*dt;
        vy += (-G_ACC - ad*vy*inv)*dt;
        x += vx*dt; y += vy*dt;
      }
      return drops;
    }

    function sdrop(bd, zero, d) {
      if (d === zero) return 0;
      return Math.round((bd[d] - (bd[zero]/zero)*d) * 10) / 10;
    }

    // ─── Ballistikdata ──────────────────────────────────────────────────────
    const CALS = {
      "9x19": { label:"9×19 mm", color:"#f59e0b", glow:"#f59e0b55",
        bullets:[
          { weight:"115 gr", type:"FMJ / RN", bc:0.135, barrels:[
            {len:'4"',mvms:351},{len:'8"',mvms:390},{len:'16"',mvms:439},{len:'18"',mvms:450}]},
          { weight:"124 gr", type:"FMJ / RN", bc:0.142, barrels:[
            {len:'4"',mvms:330},{len:'8"',mvms:375},{len:'16"',mvms:421},{len:'18"',mvms:430}]},
          { weight:"147 gr", type:"FMJ / subsonic", bc:0.165, barrels:[
            {len:'4"',mvms:290},{len:'8"',mvms:320},{len:'16"',mvms:370},{len:'18"',mvms:380}]},
        ]},
      "223rem": { label:".223 Remington", color:"#22d3ee", glow:"#22d3ee55",
        bullets:[
          { weight:"55 gr", type:"FMJ / FMJBT", bc:0.243, barrels:[
            {len:'8"',mvms:817},{len:'11"',mvms:869},{len:'14.5"',mvms:914},
            {len:'16"',mvms:945},{len:'18"',mvms:965},{len:'20"',mvms:988}]},
          { weight:"62 gr", type:"SS109 / M855", bc:0.307, barrels:[
            {len:'8"',mvms:777},{len:'11"',mvms:829},{len:'14.5"',mvms:875},
            {len:'16"',mvms:902},{len:'18"',mvms:921},{len:'20"',mvms:945}]},
          { weight:"77 gr", type:"OTM / SMK", bc:0.372, barrels:[
            {len:'8"',mvms:716},{len:'11"',mvms:762},{len:'14.5"',mvms:808},
            {len:'16"',mvms:838},{len:'18"',mvms:853},{len:'20"',mvms:869}]},
        ]},
      "308win": { label:".308 Winchester", color:"#4ade80", glow:"#4ade8055",
        bullets:[
          { weight:"147 gr", type:"FMJ M80 / FMJBT", bc:0.393, barrels:[
            {len:'13.5"',mvms:747},{len:'16"',mvms:793},{len:'18"',mvms:817},{len:'20"',mvms:838}]},
          { weight:"168 gr", type:"OTM / SMK", bc:0.475, barrels:[
            {len:'13.5"',mvms:716},{len:'16"',mvms:762},{len:'18"',mvms:793},{len:'20"',mvms:808}]},
          { weight:"175 gr", type:"OTM / SMK", bc:0.505, barrels:[
            {len:'13.5"',mvms:701},{len:'16"',mvms:747},{len:'18"',mvms:777},{len:'20"',mvms:793}]},
        ]},
    };

    function dcol(v) {
      if (v===0) return "#4ade80";
      const a = Math.abs(v);
      if (a<=5)  return "#4ade80";
      if (a<=25) return "#facc15";
      if (a<=75) return "#fb923c";
      return "#f87171";
    }
    function fmt(v) {
      if (v===0) return "±0";
      return (v>0?"+":"")+v.toFixed(1)+" cm";
    }

    // ─── Komponent ──────────────────────────────────────────────────────────
    function App() {
      const [tab,  setTab]  = useState("9x19");
      const [bi,   setBi]   = useState(0);
      const [zero, setZero] = useState(25);

      const cal = CALS[tab];
      const bul = cal.bullets[bi];

      const pc = useMemo(() => {
        const r = {};
        Object.entries(CALS).forEach(([cid, c]) => {
          r[cid] = c.bullets.map(b => b.barrels.map(bar => boreDropAll(b.bc, bar.mvms, DISP)));
        });
        return r;
      }, []);

      const TABS = [
        {id:"9x19",   label:"9×19 mm"},
        {id:"223rem", label:".223 Rem"},
        {id:"308win", label:".308 Win"},
      ];

      return (
        <div style={{minHeight:"100vh",background:"#080b10",color:"#e2e8f0",
          fontFamily:"'Share Tech Mono','Courier New',monospace",overflow:"hidden",position:"relative"}}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
            .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(34,211,238,.04) 1px,transparent 1px),
              linear-gradient(90deg,rgba(34,211,238,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
            .scan{position:fixed;top:0;left:0;right:0;height:2px;
              background:linear-gradient(90deg,transparent,var(--cc,#22d3ee),transparent);
              opacity:.3;animation:scan 8s linear infinite;pointer-events:none;z-index:1}
            @keyframes scan{0%{top:0%}100%{top:100%}}
            .tab-btn{background:transparent;border:1px solid #1e293b;color:#64748b;padding:10px 22px;cursor:pointer;
              font-family:'Orbitron',monospace;font-weight:700;font-size:13px;letter-spacing:.1em;transition:all .2s}
            .tab-btn:hover{color:#94a3b8;border-color:#334155}
            .tab-btn.on{color:var(--cc);border-color:var(--cc);background:var(--cg);
              box-shadow:0 0 14px var(--cg),inset 0 0 14px var(--cg)}
            .pill{background:transparent;border:1px solid #1e293b;color:#64748b;padding:7px 15px;cursor:pointer;
              font-family:'Share Tech Mono',monospace;font-size:12px;transition:all .15s;border-radius:3px}
            .pill:hover{color:#94a3b8;border-color:#334155}
            .pill.on{color:var(--cc);border-color:var(--cc);background:var(--cg)}
            .zbtn{background:transparent;border:1px solid #1e293b;color:#64748b;padding:9px 20px;cursor:pointer;
              font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:.1em;
              transition:all .15s;border-radius:3px}
            .zbtn:hover{color:#94a3b8;border-color:#334155}
            .zbtn.on{color:var(--cc);border-color:var(--cc);background:var(--cg);box-shadow:0 0 10px var(--cg)}
            .card{background:rgba(15,23,42,.8);border:1px solid #1e293b;border-radius:6px}
            .dt{width:100%;border-collapse:collapse;font-family:'Share Tech Mono',monospace;font-size:12px}
            .dt th{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.08em;color:#475569;
              text-transform:uppercase;padding:10px 12px;text-align:center;border-bottom:1px solid #1e293b}
            .dt td{padding:10px 12px;text-align:center;border-bottom:1px solid #0f172a}
            .dt tr:hover td{background:rgba(255,255,255,.02)}
          `}</style>

          <div className="grid-bg"/>
          <div className="scan" style={{"--cc":cal.color}}/>

          <div style={{position:"relative",zIndex:1,maxWidth:1080,margin:"0 auto",padding:"28px 20px 40px"}}>

            {/* HEADER */}
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:28}}>
              <div>
                <div style={{fontFamily:"'Orbitron',monospace",fontSize:11,letterSpacing:".25em",
                  color:cal.color,textTransform:"uppercase",marginBottom:6,opacity:.8}}>
                  ◈ Taktisk Lathund · Kulfall
                </div>
                <h1 style={{fontFamily:"'Orbitron',monospace",fontSize:28,fontWeight:900,color:"#f1f5f9",
                  letterSpacing:".06em",textShadow:`0 0 30px ${cal.glow}`,lineHeight:1.1}}>
                  BULLET DROP<br/><span style={{color:cal.color,fontSize:20}}>REFERENSGUIDE</span>
                </h1>
              </div>
              <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:"#334155",textAlign:"right",lineHeight:1.9}}>
                <div style={{color:"#475569"}}>ATMOSFÄR: ISA Standard</div>
                <div>TEMP: 15°C · HÖJD: 0 m · G1 BC</div>
                <div style={{color:cal.color,marginTop:4}}>■ NUMERISK INTEGRATION</div>
              </div>
            </div>

            {/* KALIBER-FLIKAR */}
            <div style={{display:"flex",gap:4,marginBottom:24}}>
              {TABS.map(t => (
                <button key={t.id} className={`tab-btn${tab===t.id?" on":""}`}
                  style={{"--cc":CALS[t.id].color,"--cg":CALS[t.id].glow}}
                  onClick={()=>{ setTab(t.id); setBi(0); setZero(t.id==="9x19"?25:100); }}>
                  {t.label}
                </button>
              ))}
            </div>

            {/* NOLLNINGSSELEKTOR */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:22,
              padding:"14px 18px",background:"rgba(15,23,42,.6)",
              border:`1px solid ${cal.color}33`,borderRadius:6,flexWrap:"wrap"}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontSize:11,letterSpacing:".12em",
                color:cal.color,textTransform:"uppercase",marginRight:6,opacity:.7}}>
                Nollning:
              </span>
              {ZEROS.map(z => (
                <button key={z} className={`zbtn${zero===z?" on":""}`}
                  style={{"--cc":cal.color,"--cg":cal.glow}}
                  onClick={()=>setZero(z)}>
                  {z} m
                </button>
              ))}
            </div>

            {/* KULSELEKTOR */}
            <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
              {cal.bullets.map((b,i) => (
                <button key={b.weight} className={`pill${bi===i?" on":""}`}
                  style={{"--cc":cal.color,"--cg":cal.glow}}
                  onClick={()=>setBi(i)}>
                  {b.weight} {b.type}
                </button>
              ))}
            </div>

            {/* INFO-STRIP */}
            <div style={{display:"flex",gap:20,marginBottom:16,padding:"9px 16px",
              background:`linear-gradient(90deg,${cal.glow} 0%,transparent 65%)`,
              borderLeft:`3px solid ${cal.color}`,borderRadius:"0 4px 4px 0",
              flexWrap:"wrap",alignItems:"center"}}>
              <span style={{color:cal.color,fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:13}}>{bul.weight}</span>
              <span style={{color:"#64748b",fontSize:12}}>{bul.type}</span>
              <span style={{color:"#475569",fontSize:11}}>BC {bul.bc} G1</span>
              <span style={{color:"#475569",fontSize:11}}>
                Nollning: <span style={{color:cal.color,fontWeight:"bold"}}>{zero} m</span>
              </span>
            </div>

            {/* HUVUDTABELL */}
            <div className="card" style={{marginBottom:20,overflowX:"auto"}}>
              <table className="dt">
                <thead>
                  <tr>
                    <th style={{textAlign:"left",paddingLeft:18}}>Pip</th>
                    <th>m/s</th>
                    {DISP.map(d => (
                      <th key={d} style={{
                        color: d===zero?"#fff":cal.color,
                        opacity: d===zero?1:.8,
                        fontWeight: d===zero?900:undefined,
                        background: d===zero?"rgba(255,255,255,.04)":undefined,
                      }}>
                        {d}m{d===zero?" ◉":""}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {bul.barrels.map((row, ri) => {
                    const bd = pc[tab][bi][ri];
                    return (
                      <tr key={row.len}>
                        <td style={{textAlign:"left",paddingLeft:18,fontFamily:"'Orbitron',monospace",
                          fontSize:11,letterSpacing:".06em",color:"#94a3b8",fontWeight:700}}>
                          {row.len}
                        </td>
                        <td style={{color:"#475569",fontSize:11}}>{row.mvms}</td>
                        {DISP.map(d => {
                          const drop = sdrop(bd, zero, d);
                          return (
                            <td key={d} style={{
                              fontWeight:"bold",
                              color: d===zero?"#4ade80":dcol(drop),
                              background: d===zero?"rgba(74,222,128,.06)":undefined,
                            }}>
                              {fmt(drop)}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* LEGEND + NOTERINGAR */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
              <div className="card" style={{padding:"14px 16px"}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:".1em",
                  color:"#475569",marginBottom:10}}>FÄRGKODNING KULFALL</div>
                {[
                  {c:"#4ade80", l:"±0 / ≤5 cm — Minimal korrigering"},
                  {c:"#facc15", l:"≤25 cm — Måttlig korrigering"},
                  {c:"#fb923c", l:"≤75 cm — Stor korrigering"},
                  {c:"#f87171", l:">75 cm — Extrem drop"},
                ].map(({c,l}) => (
                  <div key={c} style={{display:"flex",alignItems:"center",marginBottom:6,fontSize:11}}>
                    <span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:c,marginRight:6}}/>
                    <span style={{color:"#94a3b8"}}>{l}</span>
                  </div>
                ))}
              </div>
              <div style={{background:"rgba(15,23,42,.6)",borderLeft:`3px solid ${cal.color}`,
                padding:"10px 14px",fontSize:11,color:"#64748b",lineHeight:1.8,
                borderRadius:"0 4px 4px 0"}}>
                <div style={{fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:".1em",
                  color:"#475569",marginBottom:8}}>OBSERVERA</div>
                <div>• G1 numerisk integration (dt=0.5ms)</div>
                <div>• Nollningskolumn markerad med ◉</div>
                <div>• Positivt värde = över siktlinjen</div>
                <div>• MV varierar ±20–50 m/s beroende på fabrikat</div>
                <div>• Vinddrift ej inkluderad</div>
                <div>• Validera med din specifika ammunition</div>
              </div>
            </div>

            {/* UTGÅNGSHASTIGHET-TABELL */}
            <div>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:10,letterSpacing:".15em",
                color:"#475569",marginBottom:10,textTransform:"uppercase"}}>
                ◈ Utgångshastighet — alla laddningar & piplängder
              </div>
              <div className="card" style={{overflowX:"auto"}}>
                <table className="dt">
                  <thead>
                    <tr>
                      <th style={{textAlign:"left",paddingLeft:18}}>Kulvikt</th>
                      {cal.bullets[0].barrels.map(b => (
                        <th key={b.len} style={{color:"#64748b"}}>{b.len}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {cal.bullets.map(b => (
                      <tr key={b.weight}>
                        <td style={{textAlign:"left",paddingLeft:18,color:"#94a3b8",fontSize:12}}>
                          {b.weight} {b.type}
                        </td>
                        {b.barrels.map(row => (
                          <td key={row.len} style={{color:cal.color,opacity:.85}}>
                            {row.mvms} m/s
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* FOOTER */}
            <div style={{marginTop:28,paddingTop:16,borderTop:"1px solid #1e293b",display:"flex",
              justifyContent:"space-between",fontSize:10,color:"#334155",
              fontFamily:"'Share Tech Mono',monospace",flexWrap:"wrap",gap:8}}>
              <span>G1 ballistisk beräkning · ISA-standard 15°C · dt=0.5ms</span>
              <span style={{color:"#475569"}}>Validera alltid med din specifika ammunition och nollning</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
