<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bullet Drop Referensguide</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080b10; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const DISTANCES = [50, 80, 100, 200, 300];

    const ballistics = {
      "9x19": {
        label: "9×19mm", zero: "25 m", color: "#f59e0b", glow: "#f59e0b55",
        bullets: [
          { weight: "115 gr", type: "FMJ / RN", bc: "0.135 G1", barrels: [
            { len: '4"',  mv: 1150, mvms: 351, drop: [-4,  -17, -30, -134, -364] },
            { len: '8"',  mv: 1280, mvms: 390, drop: [-3,  -14, -24, -106, -282] },
            { len: '16"', mv: 1440, mvms: 439, drop: [-3,  -11, -19,  -83, -220] },
            { len: '18"', mv: 1476, mvms: 450, drop: [-3,  -11, -18,  -79, -210] },
          ]},
          { weight: "124 gr", type: "FMJ / RN", bc: "0.142 G1", barrels: [
            { len: '4"',  mv: 1082, mvms: 330, drop: [-5,  -21, -37, -168, -456] },
            { len: '8"',  mv: 1230, mvms: 375, drop: [-4,  -17, -29, -130, -348] },
            { len: '16"', mv: 1380, mvms: 421, drop: [-3,  -13, -22,  -97, -258] },
            { len: '18"', mv: 1410, mvms: 430, drop: [-3,  -12, -21,  -93, -246] },
          ]},
          { weight: "147 gr", type: "FMJ / subsonic", bc: "0.165 G1", barrels: [
            { len: '4"',  mv:  951, mvms: 290, drop: [-6,  -27, -47, -216, -590] },
            { len: '8"',  mv: 1050, mvms: 320, drop: [-5,  -21, -37, -170, -462] },
            { len: '16"', mv: 1214, mvms: 370, drop: [-4,  -17, -29, -131, -350] },
            { len: '18"', mv: 1247, mvms: 380, drop: [-4,  -16, -27, -124, -331] },
          ]},
        ],
      },
      "223rem": {
        label: ".223 Remington", zero: "100 m", color: "#22d3ee", glow: "#22d3ee55",
        bullets: [
          { weight: "55 gr", type: "FMJ / FMJBT", bc: "0.243 G1", barrels: [
            { len: '8"',    mv: 2680, mvms: 817, drop: [+3.2, +1.3, 0, -28, -104] },
            { len: '11"',   mv: 2850, mvms: 869, drop: [+3.0, +1.2, 0, -25,  -93] },
            { len: '14.5"', mv: 3000, mvms: 914, drop: [+2.8, +1.1, 0, -23,  -86] },
            { len: '16"',   mv: 3100, mvms: 945, drop: [+2.7, +1.1, 0, -22,  -82] },
            { len: '18"',   mv: 3165, mvms: 965, drop: [+2.6, +1.0, 0, -21,  -79] },
            { len: '20"',   mv: 3240, mvms: 988, drop: [+2.5, +1.0, 0, -20,  -76] },
          ]},
          { weight: "62 gr", type: "SS109 / M855", bc: "0.307 G1", barrels: [
            { len: '8"',    mv: 2550, mvms: 777, drop: [+3.5, +1.4, 0, -26,  -93] },
            { len: '11"',   mv: 2720, mvms: 829, drop: [+3.2, +1.3, 0, -23,  -83] },
            { len: '14.5"', mv: 2870, mvms: 875, drop: [+3.0, +1.2, 0, -21,  -76] },
            { len: '16"',   mv: 2960, mvms: 902, drop: [+2.9, +1.2, 0, -20,  -72] },
            { len: '18"',   mv: 3020, mvms: 921, drop: [+2.8, +1.1, 0, -19,  -69] },
            { len: '20"',   mv: 3100, mvms: 945, drop: [+2.7, +1.1, 0, -18,  -66] },
          ]},
          { weight: "77 gr", type: "OTM / SMK", bc: "0.372 G1", barrels: [
            { len: '8"',    mv: 2350, mvms: 716, drop: [+3.9, +1.5, 0, -27,  -92] },
            { len: '11"',   mv: 2500, mvms: 762, drop: [+3.6, +1.4, 0, -24,  -82] },
            { len: '14.5"', mv: 2650, mvms: 808, drop: [+3.3, +1.3, 0, -22,  -74] },
            { len: '16"',   mv: 2750, mvms: 838, drop: [+3.2, +1.2, 0, -21,  -70] },
            { len: '18"',   mv: 2800, mvms: 853, drop: [+3.1, +1.2, 0, -20,  -68] },
            { len: '20"',   mv: 2850, mvms: 869, drop: [+3.0, +1.2, 0, -19,  -65] },
          ]},
        ],
      },
      "308win": {
        label: ".308 Winchester", zero: "100 m", color: "#4ade80", glow: "#4ade8055",
        bullets: [
          { weight: "147 gr", type: "FMJ M80 / FMJBT", bc: "0.393 G1", barrels: [
            { len: '13.5"', mv: 2450, mvms: 747, drop: [+2.9, +1.2, 0, -30, -115] },
            { len: '16"',   mv: 2600, mvms: 793, drop: [+2.7, +1.1, 0, -27, -103] },
            { len: '18"',   mv: 2680, mvms: 817, drop: [+2.6, +1.0, 0, -25,  -97] },
            { len: '20"',   mv: 2750, mvms: 838, drop: [+2.5, +1.0, 0, -24,  -92] },
          ]},
          { weight: "168 gr", type: "OTM / Sierra MatchKing", bc: "0.475 G1", barrels: [
            { len: '13.5"', mv: 2350, mvms: 716, drop: [+3.1, +1.2, 0, -28, -103] },
            { len: '16"',   mv: 2500, mvms: 762, drop: [+2.9, +1.1, 0, -25,  -92] },
            { len: '18"',   mv: 2600, mvms: 793, drop: [+2.7, +1.1, 0, -23,  -85] },
            { len: '20"',   mv: 2650, mvms: 808, drop: [+2.6, +1.0, 0, -23,  -83] },
          ]},
          { weight: "175 gr", type: "OTM / Sierra MatchKing", bc: "0.505 G1", barrels: [
            { len: '13.5"', mv: 2300, mvms: 701, drop: [+3.2, +1.3, 0, -27,  -98] },
            { len: '16"',   mv: 2450, mvms: 747, drop: [+3.0, +1.2, 0, -24,  -87] },
            { len: '18"',   mv: 2550, mvms: 777, drop: [+2.8, +1.1, 0, -22,  -80] },
            { len: '20"',   mv: 2600, mvms: 793, drop: [+2.8, +1.1, 0, -22,  -78] },
          ]},
        ],
      },
    };

    function dropColor(v, caliber) {
      const abs = Math.abs(v);
      if (caliber === "9x19") {
        if (abs <= 6)  return "#4ade80";
        if (abs <= 20) return "#facc15";
        if (abs <= 50) return "#fb923c";
        return "#f87171";
      } else {
        if (abs <= 5)  return "#4ade80";
        if (abs <= 30) return "#facc15";
        if (abs <= 80) return "#fb923c";
        return "#f87171";
      }
    }

    function formatDrop(v) {
      if (v === 0) return "±0";
      return (v > 0 ? "+" : "") + v.toFixed(1) + " cm";
    }

    function App() {
      const [activeTab, setActiveTab] = useState("9x19");
      const [activeBullet, setActiveBullet] = useState(0);

      const cal = ballistics[activeTab];
      const bullet = cal.bullets[activeBullet];

      const tabs = [
        { id: "9x19",   label: "9×19 mm"  },
        { id: "223rem", label: ".223 Rem"  },
        { id: "308win", label: ".308 Win"  },
      ];

      return (
        <div style={{ minHeight:"100vh", background:"#080b10", color:"#e2e8f0", fontFamily:"'Share Tech Mono','Courier New',monospace", padding:0, position:"relative", overflow:"hidden" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
            .grid-bg { position:fixed; inset:0; background-image: linear-gradient(rgba(34,211,238,.04) 1px,transparent 1px), linear-gradient(90deg,rgba(34,211,238,.04) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
            .tab-btn { background:transparent; border:1px solid #1e293b; color:#64748b; padding:10px 20px; cursor:pointer; font-family:'Orbitron',monospace; font-weight:700; font-size:13px; letter-spacing:.1em; transition:all .2s; }
            .tab-btn:hover { color:#94a3b8; border-color:#334155; }
            .tab-btn.active { color:var(--cc); border-color:var(--cc); background:var(--cg); box-shadow:0 0 12px var(--cg),inset 0 0 12px var(--cg); }
            .bullet-btn { background:transparent; border:1px solid #1e293b; color:#64748b; padding:7px 16px; cursor:pointer; font-family:'Share Tech Mono',monospace; font-size:13px; transition:all .15s; border-radius:3px; }
            .bullet-btn:hover { color:#94a3b8; border-color:#334155; }
            .bullet-btn.active { color:var(--cc); border-color:var(--cc); background:var(--cg); }
            .data-table { width:100%; border-collapse:collapse; font-family:'Share Tech Mono',monospace; font-size:13px; }
            .data-table th { font-family:'Orbitron',monospace; font-size:11px; letter-spacing:.08em; color:#475569; text-transform:uppercase; padding:10px 14px; text-align:center; border-bottom:1px solid #1e293b; }
            .data-table td { padding:11px 14px; text-align:center; border-bottom:1px solid #0f172a; }
            .data-table tr:hover td { background:rgba(255,255,255,.02); }
            .barrel-col { text-align:left!important; font-family:'Orbitron',monospace; font-size:12px; letter-spacing:.06em; color:#94a3b8; font-weight:700; padding-left:20px!important; }
            .mv-col { color:#475569; font-size:11px; }
            .section-card { background:rgba(15,23,42,.8); border:1px solid #1e293b; border-radius:6px; }
            .scan-line { position:fixed; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--cc),transparent); opacity:.3; animation:scan 8s linear infinite; pointer-events:none; z-index:1; }
            @keyframes scan { 0%{top:0%} 100%{top:100%} }
            .note-box { background:rgba(15,23,42,.6); border-left:3px solid var(--cc); padding:10px 14px; font-size:11px; color:#64748b; line-height:1.7; border-radius:0 4px 4px 0; }
          `}</style>

          <div className="grid-bg" />
          <div className="scan-line" style={{"--cc": cal.color}} />

          <div style={{ position:"relative", zIndex:1, maxWidth:980, margin:"0 auto", padding:"28px 20px 40px" }}>

            {/* HEADER */}
            <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:28 }}>
              <div>
                <div style={{ fontFamily:"'Orbitron',monospace", fontSize:11, letterSpacing:".25em", color:cal.color, textTransform:"uppercase", marginBottom:6, opacity:.8 }}>◈ Taktisk Lathund · Kulfall</div>
                <h1 style={{ fontFamily:"'Orbitron',monospace", fontSize:28, fontWeight:900, color:"#f1f5f9", letterSpacing:".06em", textShadow:`0 0 30px ${cal.glow}`, lineHeight:1.1 }}>
                  BULLET DROP<br /><span style={{ color:cal.color, fontSize:20 }}>REFERENSGUIDE</span>
                </h1>
              </div>
              <div style={{ fontFamily:"'Share Tech Mono',monospace", fontSize:10, color:"#334155", textAlign:"right", lineHeight:1.8 }}>
                <div style={{ color:"#475569" }}>ATMOSFÄR: ISA Standard</div>
                <div>TEMP: 15°C · HÖJD: 0 m</div>
                <div>KALIBER: 9×19 / .223 / .308</div>
                <div style={{ color:cal.color, marginTop:4 }}>■ TÄVLINGSBRUK</div>
              </div>
            </div>

            {/* TABS */}
            <div style={{ display:"flex", gap:4, marginBottom:24 }}>
              {tabs.map(t => (
                <button key={t.id} className={`tab-btn${activeTab===t.id?" active":""}`}
                  style={{"--cc": ballistics[t.id].color, "--cg": ballistics[t.id].glow}}
                  onClick={() => { setActiveTab(t.id); setActiveBullet(0); }}>
                  {t.label}
                </button>
              ))}
            </div>

            {/* CALIBER INFO */}
            <div style={{ display:"flex", gap:16, marginBottom:18, alignItems:"center", flexWrap:"wrap" }}>
              <div className="section-card" style={{ padding:"10px 18px", borderColor:cal.color+"44", display:"flex", gap:24, flexWrap:"wrap" }}>
                <div><span style={{ color:"#475569", fontSize:10, textTransform:"uppercase", letterSpacing:".1em" }}>Kaliber · </span><span style={{ color:cal.color, fontFamily:"'Orbitron',monospace", fontSize:14, fontWeight:700 }}>{cal.label}</span></div>
                <div><span style={{ color:"#475569", fontSize:10, textTransform:"uppercase", letterSpacing:".1em" }}>Zero · </span><span style={{ color:"#e2e8f0", fontSize:14 }}>{cal.zero}</span></div>
                <div><span style={{ color:"#475569", fontSize:10, textTransform:"uppercase", letterSpacing:".1em" }}>Avstånd · </span><span style={{ color:"#e2e8f0", fontSize:14 }}>{DISTANCES.map(d=>d+"m").join(" · ")}</span></div>
              </div>
            </div>

            {/* BULLET SELECTOR */}
            <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
              {cal.bullets.map((b,i) => (
                <button key={b.weight} className={`bullet-btn${activeBullet===i?" active":""}`}
                  style={{"--cc": cal.color, "--cg": cal.glow}}
                  onClick={() => setActiveBullet(i)}>
                  {b.weight} {b.type}
                </button>
              ))}
            </div>

            {/* BULLET INFO */}
            <div style={{ display:"flex", gap:20, marginBottom:16, padding:"8px 16px", background:`linear-gradient(90deg,${cal.glow} 0%,transparent 60%)`, borderLeft:`3px solid ${cal.color}`, borderRadius:"0 4px 4px 0", flexWrap:"wrap", alignItems:"center" }}>
              <span style={{ color:cal.color, fontFamily:"'Orbitron',monospace", fontWeight:700, fontSize:13 }}>{bullet.weight}</span>
              <span style={{ color:"#64748b", fontSize:12 }}>{bullet.type}</span>
              <span style={{ color:"#475569", fontSize:11 }}>BC {bullet.bc}</span>
            </div>

            {/* MAIN TABLE */}
            <div className="section-card" style={{ marginBottom:20, overflow:"hidden" }}>
              <table className="data-table">
                <thead>
                  <tr>
                    <th style={{ textAlign:"left", paddingLeft:20 }}>Piplängd</th>
                    <th>MV (fps / m/s)</th>
                    {DISTANCES.map(d => <th key={d} style={{ color:cal.color, opacity:.8 }}>{d}m</th>)}
                  </tr>
                </thead>
                <tbody>
                  {bullet.barrels.map(row => (
                    <tr key={row.len}>
                      <td className="barrel-col">{row.len}</td>
                      <td className="mv-col">{row.mv} / {row.mvms}</td>
                      {row.drop.map((v,di) => (
                        <td key={di} style={{ fontWeight:"bold", color:dropColor(v,activeTab) }}>{formatDrop(v)}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {/* COMPARISON */}
            {cal.bullets.length > 1 && (
              <div style={{ marginBottom:20 }}>
                <div style={{ fontFamily:"'Orbitron',monospace", fontSize:10, letterSpacing:".15em", color:"#475569", marginBottom:10, textTransform:"uppercase" }}>◈ Jämförelse alla kulvikter · 200m & 300m</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))", gap:12 }}>
                  {[200,300].map(dist => {
                    const di = DISTANCES.indexOf(dist);
                    return (
                      <div key={dist} className="section-card" style={{ padding:"14px 16px" }}>
                        <div style={{ fontFamily:"'Orbitron',monospace", fontSize:11, color:cal.color, marginBottom:10, letterSpacing:".08em" }}>DROP @ {dist}m</div>
                        {cal.bullets.map(b => (
                          <div key={b.weight} style={{ marginBottom:8 }}>
                            <div style={{ fontSize:10, color:"#475569", marginBottom:4 }}>{b.weight} {b.type}</div>
                            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                              {b.barrels.map(row => (
                                <span key={row.len} style={{ fontSize:11, color:dropColor(row.drop[di],activeTab), background:"#0f172a", padding:"2px 8px", borderRadius:3, border:"1px solid #1e293b" }}>
                                  {row.len}: {formatDrop(row.drop[di])}
                                </span>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* LEGEND + NOTES */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 }}>
              <div className="section-card" style={{ padding:"14px 16px" }}>
                <div style={{ fontFamily:"'Orbitron',monospace", fontSize:10, letterSpacing:".1em", color:"#475569", marginBottom:10 }}>FÄRGKODNING KULFALL</div>
                {[
                  { color:"#4ade80", label: activeTab==="9x19" ? "≤6 cm — Minimal korrigering" : "≤5 cm — Minimal korrigering" },
                  { color:"#facc15", label: activeTab==="9x19" ? "≤20 cm — Måttlig korrigering" : "≤30 cm — Måttlig korrigering" },
                  { color:"#fb923c", label: activeTab==="9x19" ? "≤50 cm — Stor korrigering"    : "≤80 cm — Stor korrigering"    },
                  { color:"#f87171", label: "Extrem drop" },
                ].map(l => (
                  <div key={l.color} style={{ display:"flex", alignItems:"center", marginBottom:6, fontSize:11 }}>
                    <span style={{ display:"inline-block", width:10, height:10, borderRadius:2, background:l.color, marginRight:6 }} />
                    <span style={{ color:"#94a3b8" }}>{l.label}</span>
                  </div>
                ))}
              </div>
              <div className="note-box" style={{"--cc": cal.color}}>
                <div style={{ fontFamily:"'Orbitron',monospace", fontSize:10, letterSpacing:".1em", color:"#475569", marginBottom:8 }}>OBSERVERA</div>
                <div>• Värden är genomsnitt — validera med din specifika ammunition</div>
                <div>• {activeTab==="9x19" ? "Zero: 25 m (pistol/PCC-standard)" : "Zero: 100 m (standardnollning gevär)"}</div>
                <div>• Standardatmosfär: 15°C, 1013 hPa, 0 m höjd</div>
                <div>• MV varierar ±30–50 fps beroende på fabrikat</div>
                <div>• Vinddrift ej inkluderad</div>
              </div>
            </div>

            {/* MV TABLE */}
            <div style={{ marginBottom:12 }}>
              <div style={{ fontFamily:"'Orbitron',monospace", fontSize:10, letterSpacing:".15em", color:"#475569", marginBottom:10, textTransform:"uppercase" }}>◈ Muzzle Velocity — alla laddningar & piplängder</div>
              <div className="section-card" style={{ overflow:"hidden" }}>
                <table className="data-table" style={{ fontSize:12 }}>
                  <thead>
                    <tr>
                      <th style={{ textAlign:"left", paddingLeft:20 }}>Kulvikt</th>
                      {cal.bullets[0].barrels.map(b => <th key={b.len} style={{ color:"#64748b" }}>{b.len}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {cal.bullets.map(b => (
                      <tr key={b.weight}>
                        <td style={{ textAlign:"left", paddingLeft:20, color:"#94a3b8", fontSize:12 }}>{b.weight} {b.type}</td>
                        {b.barrels.map(row => (
                          <td key={row.len} style={{ color:cal.color, fontSize:12, opacity:.85 }}>
                            {row.mv} fps<br /><span style={{ color:"#475569", fontSize:10 }}>{row.mvms} m/s</span>
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* FOOTER */}
            <div style={{ marginTop:28, paddingTop:16, borderTop:"1px solid #1e293b", display:"flex", justifyContent:"space-between", fontSize:10, color:"#334155", fontFamily:"'Share Tech Mono',monospace", flexWrap:"wrap", gap:8 }}>
              <span>Beräknade värden baserade på PublicDomain ballistikdata · ISA-standard · G1 BC</span>
              <span style={{ color:"#475569" }}>Validera alltid med din specifika ammunition och nollning</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
